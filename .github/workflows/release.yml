name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Arch binary
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      artifact-path: ${{ steps.package.outputs.path }}

    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel cmake ninja git \
            qt6-base qt6-declarative qt6-wayland qt6-svg qt6-shadertools \
            pipewire wayland wayland-protocols libxcb libdrm mesa vulkan-headers \
            pam jemalloc libglvnd cli11 glib2 polkit

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark checkout as safe (container UID mismatch)
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Configure
        run: |
          cmake -GNinja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build

      - name: Stage install + package tarball
        id: package
        run: |
          set -euo pipefail
          DESTDIR="${PWD}/staging" cmake --install build
          TAG="${GITHUB_REF_NAME}"
          NAME="mcs-qs-${TAG}-linux-x86_64"
          mv staging "${NAME}"
          tar -czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          echo "path=${NAME}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: |
            mcs-qs-*.tar.gz
            mcs-qs-*.tar.gz.sha256
          retention-days: 7

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed so git describe/git log can see full history and tags

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tarball

      - name: Generate release notes
        run: |
          set -euo pipefail
          # Find previous tag. Prefer the one before the current tag on the same history;
          # fallback to the next most recent tag.
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || true)
          if [ -z "${PREV_TAG:-}" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)
          fi
          if [ -z "${PREV_TAG:-}" ]; then
            RANGE="$(git rev-list --max-parents=0 HEAD)..${GITHUB_REF_NAME}"
            SINCE_LABEL="project start"
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            SINCE_LABEL="${PREV_TAG}"
          fi
          echo "# Release ${GITHUB_REF_NAME}" > release_notes.md
          echo "" >> release_notes.md
          echo "## Changes since ${SINCE_LABEL}" >> release_notes.md
          echo "" >> release_notes.md
          git log ${RANGE} --pretty=format:"- %s ([%h](https://github.com/${GITHUB_REPOSITORY}/commit/%H)) by %an" > /tmp/commits.txt || true
          head -c 120000 /tmp/commits.txt >> release_notes.md
          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Binary" >> release_notes.md
          echo "" >> release_notes.md
          echo "Built on \`archlinux:latest\` against Qt6. Extract to \`/\` (or \`/usr/local\`) to install:" >> release_notes.md
          echo '```sh' >> release_notes.md
          echo "sudo tar xzf mcs-qs-${GITHUB_REF_NAME}-linux-x86_64.tar.gz -C /" >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            mcs-qs-*.tar.gz
            mcs-qs-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
